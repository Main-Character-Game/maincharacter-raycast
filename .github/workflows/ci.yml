name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-npm
        with:
          node-version: 22
      - run: npm run ci:quality

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-npm
        with:
          node-version: 22
      - run: npm audit --audit-level=high

  ci-required:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - quality
      - dependency-audit
    steps:
      - name: Enforce required CI outcomes
        run: |
          quality="${{ needs.quality.result }}"
          dependency_audit="${{ needs.dependency-audit.result }}"

          echo "quality: ${quality}"
          echo "dependency-audit: ${dependency_audit}"

          require_success() {
            local job_name="$1"
            local job_result="$2"
            if [[ "${job_result}" != "success" ]]; then
              echo "Required job ${job_name} did not pass (result=${job_result})."
              exit 1
            fi
          }

          require_success "quality" "${quality}"
          require_success "dependency-audit" "${dependency_audit}"

          echo "All required CI checks passed."
